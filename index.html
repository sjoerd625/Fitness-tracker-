.tab.active { border-bottom-color: #e8c840; color: #e8c840; }

.var-btn { flex: 1; padding: 12px; background: #10101a; border: 1px solid #1e1e2e; color: #555; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 11px; border-radius: 4px; transition: all 0.15s; }

  </div>

  <!-- PICK SCREEN -->

  <div class="screen" id="screen-pick">
    <button class="back-btn" onclick="showScreen('home')">← terug</button>
    <div style="font-family: 'Oswald', sans-serif; font-size: 22px; color: #ddd8ce; margin-bottom: 20px;">Welke oefening?</div>
    <div style="display: flex; flex-direction: column; gap: 10px;" id="exercise-list"></div>
  </div>

  <!-- AMOUNT SCREEN -->

  <div class="screen" id="screen-amount">
    <button class="back-btn" onclick="showScreen('pick')">← terug</button>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
      <span id="amount-icon" style="font-size: 28px;"></span>
      <div id="amount-label" style="font-family: 'Oswald', sans-serif; font-size: 22px; color: #ddd8ce;"></div>
    </div>
    <div id="variant-section" style="margin-bottom: 20px; display: none;">
      <div style="font-size: 9px; color: #333; letter-spacing: 2px; margin-bottom: 8px;">VARIANT</div>
      <div style="display: flex; gap: 8px;">
        <button class="var-btn active" id="btn-normaal" onclick="setVariant('normaal')">Normaal</button>
        <button class="var-btn" id="btn-knieen" onclick="setVariant('knieën')">Op knieën</button>
      </div>
    </div>
    <div id="unit-label" style="font-size: 9px; color: #333; letter-spacing: 2px; margin-bottom: 8px;">AANTAL</div>
    <div style="margin-bottom: 16px;">
      <input type="number" id="custom-input" placeholder="0" oninput="onCustomInput()" onkeydown="onCustomKey(event)" />
      <button id="save-custom-btn" onclick="saveCustom()" style="display:none; width: 100%; padding: 14px; background: #e8c840; color: #080810; font-family: 'Oswald', sans-serif; font-size: 18px; border: none; cursor: pointer; border-radius: 0 0 4px 4px; letter-spacing: 1px;">
        OPSLAAN ✓
      </button>
    </div>
    <div style="font-size: 9px; color: #333; letter-spacing: 2px; margin-bottom: 10px;">SNEL KIEZEN</div>
    <div id="quick-btns" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;"></div>
  </div>

<button class="fab" id="fab" onclick="showScreen('pick')">+ SCORE TOEVOEGEN</button>

</div>

<script>
  const STORAGE_KEY = "fitness_tracker_data_v1";
  const EXERCISES = [
    { key: "PU", label: "Push-ups", icon: "💪", unit: "reps", hasVariant: true },
    { key: "S",  label: "Squats",   icon: "🦵", unit: "reps", hasVariant: false },
    { key: "PL", label: "Plank",    icon: "🧘", unit: "sec",  hasVariant: false },
  ];
  const QUICK_AMOUNTS = [5, 10, 15, 20, 25, 30, 40, 50, 60, 90, 100, 120];

  let data = [];
  let activeTab = "PU";
  let selectedEx = null;
  let selectedVariant = "normaal";

  function loadData() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) return JSON.parse(s);
    } catch(e) {}
    return [{ day: 1, date: "2026-04-28", exercises: [{ type: "PU", amount: 9, variant: "knieën" }, { type: "S", amount: 90, variant: "normaal" }] }];
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function today() { return new Date().toISOString().split("T")[0]; }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
  }

  function showScreen(name) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen-" + name).classList.add("active");
    document.getElementById("fab").style.display = name === "home" ? "block" : "none";
    if (name === "home") renderHome();
  }

  function setVariant(v) {
    selectedVariant = v;
    document.getElementById("btn-normaal").className = "var-btn" + (v === "normaal" ? " active" : "");
    document.getElementById("btn-knieen").className = "var-btn" + (v === "knieën" ? " active" : "");
  }

  function onCustomInput() {
    const val = document.getElementById("custom-input").value;
    document.getElementById("save-custom-btn").style.display = (val && parseInt(val) > 0) ? "block" : "none";
  }

  function onCustomKey(e) {
    if (e.key === "Enter") {
      const val = document.getElementById("custom-input").value;
      if (val && parseInt(val) > 0) commitEntry(parseInt(val));
    }
  }

  function saveCustom() {
    const val = parseInt(document.getElementById("custom-input").value);
    if (val > 0) commitEntry(val);
  }

  function commitEntry(amount) {
    const t = today();
    const last = data[data.length - 1];
    const isToday = last && last.date === t;
    const entry = { type: selectedEx.key, amount, variant: selectedVariant };
    if (isToday) {
      data[data.length - 1].exercises.push(entry);
    } else {
      data.push({ day: (data.length > 0 ? data[data.length-1].day : 0) + 1, date: t, exercises: [entry] });
    }
    saveData();
    showToast("✓ " + amount + (selectedEx.unit === "sec" ? "s" : "") + " " + selectedEx.label + " opgeslagen!");
    document.getElementById("custom-input").value = "";
    document.getElementById("save-custom-btn").style.display = "none";
    selectedVariant = "normaal";
    showScreen("home");
  }

  function deleteEntry(dayIndex, exIndex) {
    data[dayIndex].exercises.splice(exIndex, 1);
    if (data[dayIndex].exercises.length === 0) data.splice(dayIndex, 1);
    saveData();
    showToast("🗑️ Score verwijderd");
    renderHome();
  }

  function getStats(type) {
    const dayTotals = data.map(d => ({
      day: d.day,
      total: d.exercises.filter(e => e.type === type).reduce((s, e) => s + e.amount, 0)
    })).filter(d => d.total > 0);
    if (dayTotals.length === 0) return null;
    const amounts = dayTotals.map(d => d.total);
    const todayVal = amounts[amounts.length - 1];
    const yesterday = amounts.length > 1 ? amounts[amounts.length - 2] : null;
    const first = amounts[0];
    const avg = Math.round(amounts.reduce((a, b) => a + b, 0) / amounts.length);
    const vsDayBefore = yesterday !== null ? Math.round(((todayVal - yesterday) / yesterday) * 100) : null;
    const vsFirst = amounts.length > 1 ? Math.round(((todayVal - first) / first) * 100) : null;
    return { today: todayVal, yesterday, first, avg, vsDayBefore, vsFirst, total: amounts.reduce((a, b) => a + b, 0), dayTotals };
  }

  function renderHome() {
    const currentDay = data.length > 0 ? data[data.length - 1].day : 0;
    document.getElementById("current-day").textContent = currentDay;
    document.getElementById("progress-bar").style.width = currentDay + "%";

    // Today entries
    const t = today();
    const todayData = data.find(d => d.date === t);
    const todayEntries = todayData ? todayData.exercises : [];
    const todaySec = document.getElementById("today-section");
    const todayDiv = document.getElementById("today-entries");
    if (todayEntries.length > 0) {
      todaySec.style.display = "block";
      todayDiv.innerHTML = todayEntries.map(e => {
        const ex = EXERCISES.find(x => x.key === e.type);
        return `<span style="background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.18); color: #4ade80; padding: 3px 10px; font-size: 11px; border-radius: 3px;">${ex.icon} ${e.amount}${ex.unit === "sec" ? "s" : ""} ${ex.label}${e.variant !== "normaal" ? ` (${e.variant})` : ""}</span>`;
      }).join("");
    } else {
      todaySec.style.display = "none";
    }

    // Tabs
    document.getElementById("tabs").innerHTML = EXERCISES.map(e =>
      `<button class="tab ${activeTab === e.key ? "active" : ""}" onclick="setTab('${e.key}')">${e.icon} ${e.label}</button>`
    ).join("");

    // Stats
    const stats = getStats(activeTab);
    const exInfo = EXERCISES.find(e => e.key === activeTab);
    const statsDiv = document.getElementById("stats-section");
    if (stats) {
      const vsDayColor = stats.vsDayBefore === null ? "#444" : stats.vsDayBefore >= 0 ? "#4ade80" : "#f87171";
      const max = Math.max(...stats.dayTotals.map(d => d.total));
      statsDiv.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px;">
          <div class="stat-box"><div style="font-family:'Oswald',sans-serif;font-size:20px;color:#e8c840;line-height:1;">${stats.today}${exInfo.unit==="sec"?"s":""}</div><div style="font-size:8px;color:#333;margin-top:4px;text-transform:uppercase;letter-spacing:1px;">Vandaag</div></div>
          <div class="stat-box"><div style="font-family:'Oswald',sans-serif;font-size:20px;color:#e8c840;line-height:1;">${stats.avg}${exInfo.unit==="sec"?"s":""}</div><div style="font-size:8px;color:#333;margin-top:4px;text-transform:uppercase;letter-spacing:1px;">Gemiddeld</div></div>
          <div class="stat-box"><div style="font-family:'Oswald',sans-serif;font-size:20px;color:#e8c840;line-height:1;">${stats.total}</div><div style="font-size:8px;color:#333;margin-top:4px;text-transform:uppercase;letter-spacing:1px;">Totaal</div></div>
          <div class="stat-box"><div style="font-family:'Oswald',sans-serif;font-size:20px;color:${vsDayColor};line-height:1;">${stats.vsDayBefore===null?"—":(stats.vsDayBefore>0?"+":"")+stats.vsDayBefore+"%"}</div><div style="font-size:8px;color:#333;margin-top:4px;text-transform:uppercase;letter-spacing:1px;">vs Gisteren</div></div>
        </div>
        <div style="background:#10101a;border:1px solid #1c1c2c;border-radius:6px;padding:12px 14px;margin-bottom:10px;">
          <div style="font-size:9px;color:#333;letter-spacing:2px;margin-bottom:8px;">ANALYSE</div>
          ${stats.vsDayBefore !== null ? `<div style="font-size:12px;display:flex;justify-content:space-between;margin-bottom:5px;"><span style="color:#444;">vs gisteren</span><span style="color:${stats.vsDayBefore>=0?"#4ade80":"#f87171"};">${stats.vsDayBefore>=0?"▲":"▼"} ${Math.abs(stats.vsDayBefore)}% <span style="color:#2a2a3a;font-size:10px;">(${stats.yesterday} → ${stats.today})</span></span></div>` : ""}
          ${stats.vsFirst !== null ? `<div style="font-size:12px;display:flex;justify-content:space-between;"><span style="color:#444;">vs dag 1</span><span style="color:${stats.vsFirst>=0?"#4ade80":"#f87171"};">${stats.vsFirst>=0?"▲":"▼"} ${Math.abs(stats.vsFirst)}% <span style="color:#2a2a3a;font-size:10px;">(${stats.first} → ${stats.today})</span></span></div>` : ""}
        </div>
        <div style="background:#10101a;border:1px solid #1c1c2c;border-radius:6px;padding:12px 14px;margin-bottom:20px;">
          <div style="font-size:9px;color:#333;letter-spacing:2px;margin-bottom:10px;">PROGRESSIE</div>
          ${stats.dayTotals.slice(-7).map(d => `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;">
              <span style="color:#333;font-size:10px;width:30px;text-align:right;">D${d.day}</span>
              <div style="flex:1;height:4px;background:#1a1a25;border-radius:2px;">
                <div style="height:100%;width:${(d.total/max)*100}%;background:linear-gradient(90deg,#e8c840,#ff9f43);border-radius:2px;"></div>
              </div>
              <span style="color:#ddd8ce;font-size:11px;width:34px;">${d.total}</span>
            </div>`).join("")}
        </div>`;
    } else {
      statsDiv.innerHTML = `<div style="text-align:center;color:#222;padding:24px 0;font-size:12px;">Nog geen data voor ${exInfo.label}</div>`;
    }

    // Logboek
    const logDiv = document.getElementById("logboek");
    if (data.length === 0) { logDiv.innerHTML = `<div style="padding:16px;color:#333;font-size:12px;text-align:center;">Nog geen scores</div>`; return; }
    logDiv.innerHTML = [...data].reverse().map((d, ri) => {
      const dayIndex = data.length - 1 - ri;
      return `<div style="padding:10px 14px;border-bottom:${ri < data.length-1 ? "1px solid #141420" : "none"};">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div><span style="font-family:'Oswald',sans-serif;font-size:15px;color:#e8c840;">DAG ${d.day}</span><span style="color:#222;font-size:10px;margin-left:8px;">${d.date}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          ${d.exercises.map((e, j) => {
            const ex = EXERCISES.find(x => x.key === e.type);
            return `<div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="background:#18182a;border:1px solid #202030;padding:3px 8px;font-size:10px;color:#666;border-radius:3px;">${ex.icon} ${e.amount}${ex.unit==="sec"?"s":""} ${ex.label}${e.variant!=="normaal"?` (${e.variant})`:""}</span>
              <button onclick="confirmDelete(${dayIndex},${j})" style="background:none;border:1px solid #2a1515;color:#3a2020;padding:3px 8px;font-size:10px;cursor:pointer;border-radius:3px;font-family:'Space Mono',monospace;">🗑️</button>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("");
  }

  function setTab(key) {
    activeTab = key;
    renderHome();
  }

  function confirmDelete(dayIndex, exIndex) {
    if (confirm("Score verwijderen?")) deleteEntry(dayIndex, exIndex);
  }

  function renderPick() {
    document.getElementById("exercise-list").innerHTML = EXERCISES.map(e =>
      `<div class="ex-card" onclick="selectExercise('${e.key}')">
        <span style="font-size:30px;">${e.icon}</span>
        <div style="flex:1;">
          <div style="font-family:'Oswald',sans-serif;font-size:20px;color:#ddd8ce;">${e.label}</div>
          <div style="font-size:10px;color:#444;margin-top:2px;">in ${e.unit}</div>
        </div>
        <span style="color:#2a2a3a;font-size:20px;">→</span>
      </div>`
    ).join("");
  }

  function selectExercise(key) {
    selectedEx = EXERCISES.find(e => e.key === key);
    selectedVariant = "normaal";
    document.getElementById("amount-icon").textContent = selectedEx.icon;
    document.getElementById("amount-label").textContent = selectedEx.label;
    document.getElementById("unit-label").textContent = "AANTAL" + (selectedEx.unit === "sec" ? " (seconden)" : "");
    document.getElementById("variant-section").style.display = selectedEx.hasVariant ? "block" : "none";
    setVariant("normaal");
    document.getElementById("custom-input").value = "";
    document.getElementById("save-custom-btn").style.display = "none";
    const qDiv = document.getElementById("quick-btns");
    qDiv.innerHTML = QUICK_AMOUNTS.map(n => `<button class="quick-btn" onclick="commitEntry(${n})">${n}</button>`).join("");
    showScreen("amount");
  }

  // Init
  data = loadData();
  renderPick();
  renderHome();
</script>

</body>
</html>

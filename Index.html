const STORAGE_KEY = "fitness_tracker_data_v1";

const INITIAL_DATA = [
  { day: 1, date: "2026-04-28", exercises: [{ type: "PU", amount: 9, variant: "knieën" }, { type: "S", amount: 90, variant: "normaal" }] }
];

const EXERCISES = [
  { key: "PU", label: "Push-ups", icon: "💪", unit: "reps", hasVariant: true },
  { key: "S",  label: "Squats",   icon: "🦵", unit: "reps", hasVariant: false },
  { key: "PL", label: "Plank",    icon: "🧘", unit: "sec",  hasVariant: false },
];

const QUICK_AMOUNTS = [5, 10, 15, 20, 25, 30, 40, 50, 60, 90, 100, 120];

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return INITIAL_DATA;
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function getStats(data, type) {
  const dayTotals = data.map(d => ({
    day: d.day,
    total: d.exercises.filter(e => e.type === type).reduce((s, e) => s + e.amount, 0)
  })).filter(d => d.total > 0);
  if (dayTotals.length === 0) return null;
  const amounts = dayTotals.map(d => d.total);
  const today = amounts[amounts.length - 1];
  const yesterday = amounts.length > 1 ? amounts[amounts.length - 2] : null;
  const first = amounts[0];
  const avg = Math.round(amounts.reduce((a, b) => a + b, 0) / amounts.length);
  const vsDayBefore = yesterday !== null ? Math.round(((today - yesterday) / yesterday) * 100) : null;
  const vsFirst = amounts.length > 1 ? Math.round(((today - first) / first) * 100) : null;
  return { today, yesterday, first, avg, vsDayBefore, vsFirst, total: amounts.reduce((a, b) => a + b, 0), dayTotals };
}

function SwipeDeleteConfirm({ entry, onConfirm, onCancel }) {
  const [swipeX, setSwipeX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [startX, setStartX] = useState(0);
  const confirmed = swipeX > 220;
  const ex = EXERCISES.find(x => x.key === entry.type);

  function onPointerDown(e) { setDragging(true); setStartX(e.clientX); e.currentTarget.setPointerCapture(e.pointerId); }
  function onPointerMove(e) { if (!dragging) return; const dx = Math.max(0, Math.min(260, e.clientX - startX)); setSwipeX(dx); }
  function onPointerUp() {
    setDragging(false);
    if (swipeX > 220) onConfirm();
    else setSwipeX(0);
  }

  return (
    <div style={{ background: "#1a0808", border: "1px solid #3a1010", borderRadius: "8px", padding: "16px", marginBottom: "10px" }}>
      <div style={{ fontSize: "10px", color: "#f87171", letterSpacing: "2px", marginBottom: "10px" }}>
        ⚠️ VERWIJDEREN: {ex?.icon} {entry.amount}{ex?.unit === "sec" ? "s" : ""} {ex?.label}{entry.variant !== "normaal" ? ` (${entry.variant})` : ""}
      </div>
      <div style={{ fontSize: "11px", color: "#666", marginBottom: "14px" }}>Swipe naar rechts om te bevestigen</div>
      <div style={{ position: "relative", height: "48px", background: "#120808", borderRadius: "6px", overflow: "hidden", userSelect: "none" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${swipeX + 48}px`, background: confirmed ? "rgba(248,113,113,0.3)" : "rgba(248,113,113,0.1)", transition: dragging ? "none" : "all 0.3s", borderRadius: "6px" }} />
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", color: confirmed ? "#f87171" : "#444", letterSpacing: "1px", pointerEvents: "none" }}>
          {confirmed ? "LOS MAAR! 🗑️" : "→ →  VERWIJDER  → →"}
        </div>
        <div
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          style={{
            position: "absolute", left: `${swipeX}px`, top: "4px", bottom: "4px", width: "44px",
            background: confirmed ? "#f87171" : "#2a1010", border: `1px solid ${confirmed ? "#f87171" : "#3a1515"}`,
            borderRadius: "4px", cursor: "grab", display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: "18px", transition: dragging ? "none" : "left 0.3s", touchAction: "none",
            boxShadow: confirmed ? "0 0 12px rgba(248,113,113,0.5)" : "none"
          }}
        >🗑️</div>
      </div>
      <button onClick={onCancel} style={{ marginTop: "12px", background: "none", border: "none", color: "#444", fontSize: "11px", cursor: "pointer", fontFamily: "'Space Mono', monospace" }}>
        ← annuleren
      </button>
    </div>
  );
}

function FitnessTracker() {
  const [data, setData] = useState(() => loadData());
  const [screen, setScreen] = useState("home");
  const [selectedEx, setSelectedEx] = useState(null);
  const [selectedVariant, setSelectedVariant] = useState("normaal");
  const [customAmount, setCustomAmount] = useState("");
  const [activeTab, setActiveTab] = useState("PU");
  const [toast, setToast] = useState("");
  const [deleteTarget, setDeleteTarget] = useState(null);

  useEffect(() => { saveData(data); }, [data]);

  const currentDay = data.length > 0 ? data[data.length - 1].day : 0;

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 2500);
  }

  function commitEntry(amount) {
    const today = new Date().toISOString().split("T")[0];
    const lastEntry = data[data.length - 1];
    const isToday = lastEntry && lastEntry.date === today;
    const entry = { type: selectedEx.key, amount, variant: selectedVariant };
    if (isToday) {
      setData(prev => prev.map((d, i) => i === prev.length - 1 ? { ...d, exercises: [...d.exercises, entry] } : d));
    } else {
      setData(prev => [...prev, { day: currentDay + 1, date: today, exercises: [entry] }]);
    }
    showToast(`✓ ${amount}${selectedEx.unit === "sec" ? "s" : ""} ${selectedEx.label} opgeslagen!`);
    setScreen("home");
    setCustomAmount("");
    setSelectedVariant("normaal");
  }

  function deleteEntry(dayIndex, exIndex) {
    setData(prev => {
      const newData = prev.map((d, di) => {
        if (di !== dayIndex) return d;
        const newExercises = d.exercises.filter((_, ei) => ei !== exIndex);
        return { ...d, exercises: newExercises };
      }).filter(d => d.exercises.length > 0);
      return newData;
    });
    setDeleteTarget(null);
    showToast("🗑️ Score verwijderd");

    <div style={{ minHeight: "100vh", background: "#080810", color: "#ddd8ce", fontFamily: "'Space Mono', monospace", maxWidth: "480px", margin: "0 auto", position: "relative", paddingTop: "env(safe-area-inset-top)" }}>
      <style>{`
